<!DOCTYPE html>
<html>
<head>
  <title>Healthcare Intelligence Updates</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #dcdcdc;
    }

    .container {
      border: 2px solid #2e6b4f;
      margin: 20px;
      padding: 20px;
      background: #e6e6e6;
    }

    h2 {
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .box {
      border: 2px solid #3b73c4;
      background: #f5f5f5;
      height: 500px;
      overflow-y: auto;
      padding: 10px;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .entry {
      border-bottom: 1px solid #ccc;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }

    .timestamp {
      color: #777;
      font-size: 12px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>HEALTHCARE INTELLIGENCE UPDATES</h2>
  <div id="logBox" class="box"></div>
</div>

<script>
// TODO: replace with your team's n8n cloud webhook URL before deployment
const endpoint = "https://definite-hunting-antarctic.ngrok-free.dev/webhook-test/market-logs";
const POLL_INTERVAL_MS = 120000; // 2 minutes
let lastText = "";

async function fetchText() {
  try {
    const res = await fetch(endpoint);
    const text = await res.text();

    if (text && text !== lastText) {
      const box = document.getElementById("logBox");

      const entry = document.createElement("div");
      entry.className = "entry";

      const ts = document.createElement("div");
      ts.className = "timestamp";
      ts.textContent = "Updated: " + new Date().toLocaleString();

      const body = document.createElement("div");
      body.textContent = text;

      entry.appendChild(ts);
      entry.appendChild(body);
      box.appendChild(entry);

      box.scrollTop = box.scrollHeight;
      lastText = text;
    }
  } catch (err) {
    console.error("Error fetching healthcare brief:", err);
  }
}

setInterval(fetchText, POLL_INTERVAL_MS);
fetchText();
</script>
</body>
</html>
